<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bento Debugger</title>
  <style>
    /* Clean high-contrast minimalist styles */
    body {
      width: 320px;
      padding: 16px;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #faf9f6;
      color: #111;
    }
    
    .grid-container {
      display: grid;
      grid-gap: 12px;
    }

    .card {
      background: #fff;
      border: 1.5px solid #111;
      padding: 12px;
      box-shadow: 2px 2px 0px #111;
    }

    .title-serif {
      font-family: Georgia, serif;
      font-size: 18px;
      font-weight: 700;
      margin: 0 0 4px 0;
    }

    /* Danger alert box */
    .warning-box {
      border: 1.5px solid #b84a39;
      background-color: #fdf5f4;
      color: #b84a39;
      font-size: 11px;
      font-weight: bold;
      padding: 8px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      text-align: center;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    input[type="text"] {
      border: 1.5px solid #111;
      padding: 6px 8px;
      font-size: 12px;
      outline: none;
    }

    button {
      background: #111;
      color: #fff;
      border: 1.5px solid #111;
      padding: 6px;
      font-size: 11px;
      font-weight: bold;
      text-transform: uppercase;
      cursor: pointer;
    }

    button:hover {
      background: #fff;
      color: #111;
    }

    .console-box {
      background: #1e1e1e;
      color: #f87171;
      font-family: monospace;
      font-size: 10px;
      padding: 8px;
      border: 1.5px solid #111;
      min-height: 50px;
      white-space: pre-wrap;
      word-break: break-all;
    }
  </style>
</head>
<body>

  <div class="grid-container">
    <!-- Header -->
    <div class="card">
      <h1 class="title-serif">Bento Debugger</h1>
      <span style="font-size: 9px; color: #888; text-transform: uppercase; letter-spacing: 0.1em;">Extension Sandbox</span>
    </div>

    <!-- Warning Block -->
    <div class="warning-box" id="key-status">
      Status: No API Key Bound
    </div>

    <!-- Input Form -->
    <div class="card form-group">
      <label style="font-size: 10px; font-weight: bold; text-transform: uppercase;">Linguistic Term</label>
      <input type="text" id="term-input" placeholder="e.g. Flâneur" value="Flâneur">
      <button id="deconstruct-btn">Deconstruct</button>
    </div>

    <!-- Error Display (Output Console) -->
    <div class="form-group">
      <span style="font-size: 10px; font-weight: bold; text-transform: uppercase; color: #666;">Extension Console</span>
      <div class="console-box" id="error-console">System idle. Ready for API request.</div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
